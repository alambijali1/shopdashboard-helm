apiVersion: v1
kind: Service
metadata:
  name: shopdashboard-active
  labels:
    {{- include "shopdashboard.labels" . | nindent 4 }}
    app.kubernetes.io/slot: active
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "shopdashboard.selectorLabels" . | nindent 4 }}

---

apiVersion: v1
kind: Service
metadata:
  name: shopdashboard-preview
  labels:
    {{- include "shopdashboard.labels" . | nindent 4 }}
    app.kubernetes.io/slot: preview
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "shopdashboard.selectorLabels" . | nindent 4 }}
